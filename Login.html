<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - HPPyCalc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f0f9ff;
        background-image: radial-gradient(#bae6fd 1px, transparent 1px);
        background-size: 32px 32px;
        overflow-x: hidden;
      }
      .login-card {
        animation: fadeIn 0.6s ease-out forwards;
        transition: all 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .page-exit {
        opacity: 0 !important;
        transform: translateX(-50px) !important;
        filter: blur(8px);
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-0 sm:p-4">
    <div
      id="mainCard"
      class="login-card w-full max-w-5xl bg-white md:rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-screen md:min-h-[600px]"
    >
      <div
        class="hidden md:flex md:w-1/2 bg-blue-600 p-12 flex-col justify-center text-white relative"
      >
        <div class="relative z-10">
          <h1 class="text-5xl font-extrabold tracking-tighter mb-4">
            HPPyCalc
          </h1>
          <p class="text-blue-100 text-lg leading-relaxed mb-8">
            Solusi perhitungan Harga Pokok Penjualan yang cepat, akurat, dan
            dirancang khusus untuk pertumbuhan UMKM Anda.
          </p>
        </div>
        <div
          class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-blue-500 rounded-full opacity-50 blur-3xl"
        ></div>
      </div>

      <div
        class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center bg-white relative"
      >
        <div class="mb-6">
          <button
            id="btnKembali"
            class="inline-flex items-center gap-2 text-sm font-semibold text-gray-400 hover:text-blue-600 transition-all group"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              />
            </svg>
            Kembali ke Beranda
          </button>
        </div>

        <div class="text-center md:text-left mb-8">
          <h2 class="text-2xl font-bold text-gray-900">Masuk Akun</h2>
          <p class="text-gray-500 text-sm mt-1">
            Masukan Akun Jika Sudah Berlangganan
          </p>
        </div>

        <div
          id="errorMessage"
          class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-xl border border-red-200 text-center font-semibold"
        >
          Username atau Password salah!
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Username</label
            >
            <input
              id="emailPhone"
              type="text"
              required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all outline-none"
              placeholder="Masukkan username"
            />
          </div>
<div class="relative">
    <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Password</label>
    <input
        id="password"
        name="password"
        type="password"
        required
        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 placeholder-gray-400 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all pr-12"
        placeholder="••••••••"
    />
    <button type="button" onclick="togglePassword()" class="absolute right-4 top-[42px] text-gray-400 hover:text-blue-600 focus:outline-none">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
    </button>
</div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-200 active:scale-[0.98]"
          >
            Masuk Sekarang
          </button>
        </form>

        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-100"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-4 text-gray-400 font-medium"
              >Atau Berlangganan</span
            >
          </div>
        </div>

        <a href="https://wa.me/6285331885155" class="block">
          <button
            type="button"
            class="w-full flex justify-center items-center gap-3 py-3 border border-gray-200 rounded-xl text-gray-700 font-semibold hover:bg-gray-50 transition-all"
          >
            <img src="WhaatApp.png" alt="WA" class="w-6 h-6" />
            Beli Akun via WhatsApp
          </button>
        </a>

        <p class="mt-8 text-center text-xs text-gray-400">
          &copy; <span id="year"></span> HPPyCalc.
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
